<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export All Student Solutions to Word</title>
  <style>
    /* Global styling for screen preview */
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #f4f4f6;
      margin: 0;
      padding: 16px;
      color: #1e293b;
    }
    
    /* Individual student sheet container */
    .student-sheet {
      background: #ffffff;
      padding: 32px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .header-info {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      border-bottom: 2px solid #1e293b;
      padding-bottom: 12px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 16px;
      line-height: 1.3;
    }

    .solution-content {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      line-height: 1.4;
      text-align: left;
      column-count: 2;
      column-gap: 40px;
      column-rule: 1px solid #cbd5e1;
    }

    .solution-content p, 
    .solution-content ul, 
    .solution-content ol,
    .solution-content img {
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 12px;
    }

    .solution-content img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .solution-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .solution-content th, 
    .solution-content td {
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      text-align: left;
    }

    .solution-content th {
      background-color: #f8fafc;
      font-weight: 700;
    }

    .solution-content tr:nth-child(even) {
      background-color: #f8fafc;
    }

    .action-header {
      margin-bottom: 24px;
      text-align: right;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .print-trigger-btn {
      padding: 12px 24px; 
      background: #10b981; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold; 
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      transition: background 0.2s ease;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .print-trigger-btn:hover {
      background: #059669;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .action-header { text-align: center; margin-bottom: 16px; }
      .print-trigger-btn { width: 100%; max-width: 400px; }
      .student-sheet { padding: 20px; margin-bottom: 16px; }
      .header-info { flex-direction: column; justify-content: flex-start; gap: 8px; }
      .header-info div:last-child { text-align: left !important; }
      .solution-content { column-count: 1; column-rule: none; }
      .solution-content table { display: block; width: 100%; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>

  <div class="no-print action-header">
    <button onclick="exportAllToDocx()" class="print-trigger-btn">
      📄 Confirm & Export All Sheets (.Docx)
    </button>
  </div>

  <div id="print-container">
    <p style="color:#666; font-size:14px; font-family: system-ui, -apple-system, sans-serif;">Querying database system records...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ixncydkmeihhdpvsmjtx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_kILpb-WHjdkpeRXVpeQ2dA_MAMqf5m7";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('examId');
    let fetchedRecordsGlobal = [];

    async function fetchAndRenderSolutions() {
      const container = document.getElementById('print-container');
      
      if (!examId) {
        container.innerHTML = "<p style='color:#ef4444; font-size:14px; font-weight:bold; font-family: system-ui, -apple-system, sans-serif;'>Error: No Exam ID parameter targeted in URL route query string.</p>";
        return;
      }

      const { data, error } = await supabaseClient
        .from('mutated_solutions')
        .select(`
          unique_solution_text,
          profiles:student_id ( full_name ),
          exams:exam_id ( subject )
        `)
        .eq('exam_id', examId);

      if (error) {
        console.error("Error fetching print records:", error.message);
        container.innerHTML = `<p style='color:#ef4444; font-size:14px; font-family: system-ui, -apple-system, sans-serif;'>Database Query Failure: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div style="background: #fff; padding: 25px; border-radius: 6px; border: 1px solid #e1e1e6; font-family: system-ui, -apple-system, sans-serif; max-width: 1200px; margin: 0 auto;">
            <p style='color:#f59e0b; font-size:15px; font-weight: 600; margin-bottom: 8px;'>No student variations found for this exam layout yet (ID: EXM-${examId}).</p>
          </div>
        `;
        return;
      }

      container.innerHTML = "";
      fetchedRecordsGlobal = data;

      data.forEach(record => {
        const studentName = record.profiles?.full_name || "Unknown Candidate";
        const subjectName = record.exams?.subject || "Examination Paper Copy";
        const solutionText = record.unique_solution_text || "<p>No solution text written.</p>";

        const sheetHTML = `
          <div class="student-sheet">
            <div class="header-info">
              <div>
                <strong style="text-transform: uppercase;">Candidate Name:</strong> ${studentName}<br>
                <strong style="text-transform: uppercase;">Subject Context:</strong> ${subjectName}
              </div>
              <div style="text-align: right;">
                <strong>EXAMINATION ARCHITECTURE STATUS</strong><br>
                <span style="font-size: 9pt; color:#666;">SYS REGISTERED CODE: EXM-${examId}</span>
              </div>
            </div>
            <div class="solution-content">${solutionText}</div>
          </div>
        `;
        container.innerHTML += sheetHTML;
      });
    }

    // Dynamic Docx Generation Engine Function
    function exportAllToDocx() {
      if (!fetchedRecordsGlobal || fetchedRecordsGlobal.length === 0) {
        alert("Error: No data available yet to compile into document formatting.");
        return;
      }

      // Build specific CSS to embedded styles inside Word document to handle multi-column & table formatting rules
      let docHtmlBody = "";

      fetchedRecordsGlobal.forEach((record, index) => {
        const studentName = record.profiles?.full_name || "Unknown Candidate";
        const subjectName = record.exams?.subject || "Examination Paper Copy";
        const solutionText = record.unique_solution_text || "<p>No solution text written.</p>";

        // Standard Word Page break wrapper
        const pageBreakStyle = index > 0 ? 'style="page-break-before: always; border-top: 1px dashed #ccc; padding-top:20px;"' : '';

        docHtmlBody += `
          <div ${pageBreakStyle}>
            <table width="100%" style="border-bottom: 2px solid #000000; margin-bottom: 20px; padding-bottom: 10px; font-family:'Courier New'; font-size:11pt;">
              <tr>
                <td align="left" style="border:none;">
                  <strong>CANDIDATE NAME:</strong> ${studentName}<br/>
                  <strong>SUBJECT CONTEXT:</strong> ${subjectName}
                </td>
                <td align="right" style="border:none; text-align:right;">
                  <strong>EXAMINATION ARCHITECTURE STATUS</strong><br/>
                  <span style="font-size:9pt; color:#555555;">SYS REGISTERED CODE: EXM-${examId}</span>
                </td>
              </tr>
            </table>
            <div style="font-family:'Courier New'; font-size:10.5pt; line-height:1.4;">
              ${solutionText}
            </div>
          </div>
        `;
      });

      // Construct Document XML wrapper wrapper for Microsoft Word compatibility
      const docxHeader = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><title>Master Solution Export</title><style>
        table { border-collapse: collapse; width: 100%; margin: 12px 0; }
        th, td { border: 1px solid #cbd5e1; padding: 6px 10px; text-align: left; }
        th { background-color: #f1f5f9; font-weight: bold; }
      </style></head><body style="padding:40px;">`;
      const docxFooter = "</body></html>";

      const finalSourceHTML = docxHeader + docHtmlBody + docxFooter;

      // Convert to standard byte-stream safe Blob layout parameters
      const blob = new Blob(['\ufeff' + finalSourceHTML], {
        type: 'application/msword'
      });

      // Handle structural programmatic trigger file download routine
      const downloadUrl = URL.createObjectURL(blob);
      const tempAnchor = document.createElement('a');
      tempAnchor.href = downloadUrl;
      tempAnchor.download = `Exam_EXM-${examId}_Master_Roster_Solutions.docx`;
      document.body.appendChild(tempAnchor);
      tempAnchor.click();
      document.body.removeChild(tempAnchor);
      URL.revokeObjectURL(downloadUrl);
    }

    fetchAndRenderSolutions();
  </script>
</body>
</html>
