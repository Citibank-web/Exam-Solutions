<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export All Student Solutions</title>
  <style>
    /* Global styling for screen preview */
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #f4f4f6;
      margin: 0;
      padding: 16px;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* Branded Main Header for Portal Layout */
    .portal-main-header {
      text-align: center;
      margin: 20px auto 32px auto;
      max-width: 1200px;
      width: 100%;
    }
    .portal-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: 1px;
      margin: 0 0 8px 0;
      display: inline-block;
      border-bottom: 3px solid #ef4444;
      padding-bottom: 4px;
    }
    .portal-subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 2px;
      margin: 0 0 16px 0;
      text-transform: uppercase;
    }
    .telegram-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #24a1de, #1d82b2);
      color: #ffffff;
      text-decoration: none;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 18px;
      border-radius: 20px;
      box-shadow: 0 4px 12px rgba(36, 161, 222, 0.3);
      transition: all 0.2s ease;
    }
    .telegram-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(36, 161, 222, 0.4);
    }

    /* Individual student sheet container */
    .student-sheet {
      background: #ffffff;
      padding: 32px;
      margin-bottom: 32px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* Premium Branded Candidate Meta Info Card */
    .header-info {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-left: 5px solid #3b82f6;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      line-height: 1.5;
    }
    .header-info .meta-left strong {
      color: #475569;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .header-info .meta-left .val-text {
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
    }
    .header-info .meta-right {
      text-align: right;
    }
    .header-info .meta-right .status-tag {
      font-size: 10px;
      font-weight: 800;
      background: #e0f2fe;
      color: #0369a1;
      padding: 4px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .header-info .meta-right .sys-code {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      display: block;
    }

    .solution-content {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      line-height: 1.4;
      text-align: left;
      column-count: 2;
      column-gap: 40px;
      column-rule: 1px solid #cbd5e1;
    }

    .solution-content p, 
    .solution-content ul, 
    .solution-content ol,
    .solution-content img {
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 12px;
    }

    .solution-content img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .solution-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .solution-content th, 
    .solution-content td {
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      text-align: left;
    }

    .solution-content th {
      background-color: #f8fafc;
      font-weight: 700;
    }

    .solution-content tr:nth-child(even) {
      background-color: #f8fafc;
    }

    .action-header {
      margin-bottom: 24px;
      display: none; /* Controlled dynamically by Supabase Authentication Guard */
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      background: #ffffff;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
    }

    .ict-generator-box {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .ict-input {
      width: 80px;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-weight: bold;
      text-align: center;
      font-size: 14px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      padding: 12px 24px; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold; 
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn-docx {
      background: #10b981; 
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    .btn-docx:hover { background: #059669; }

    .btn-pdf {
      background: #ef4444; 
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    }
    .btn-pdf:hover { background: #dc2626; }

    .btn-ict {
      background: #f59e0b;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
    }
    .btn-ict:hover { background: #d97706; }

    /* Branded Application Portal Footer */
    .portal-main-footer {
      margin-top: auto;
      padding: 24px 16px;
      text-align: center;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .action-header { flex-direction: column; text-align: center; margin-bottom: 16px; }
      .ict-generator-box { width: 100%; flex-direction: column; }
      .ict-input { width: 100%; box-sizing: border-box; }
      .btn-group { width: 100%; flex-direction: column; }
      .action-btn { width: 100%; }
      .student-sheet { padding: 20px; margin-bottom: 16px; }
      .header-info { flex-direction: column; align-items: flex-start; gap: 12px; padding: 14px; }
      .header-info .meta-right { text-align: left !important; }
      .solution-content { column-count: 1; column-rule: none; }
      .solution-content table { display: block; width: 100%; overflow-x: auto; white-space: nowrap; }
    }

    /* ==========================================================================
       HIGH-FIDELITY PDF/PRINT COMPILER ENGINE OVERRIDES
       ========================================================================== */
    @media print {
      @page {
        size: A4 portrait;
        margin: 15mm;
      }

      body {
        font-family: 'Courier New', Courier, monospace;
        background-color: #ffffff;
        padding: 0;
        color: #000000;
      }
      
      .student-sheet {
        border: none;
        padding: 0;
        margin: 0;
        box-shadow: none;
        page-break-after: always; 
        break-after: page;
        width: 100%;
      }

      /* Revert header metadata design to native monochrome standard layout on A4 paper */
      .header-info {
        font-family: 'Courier New', Courier, monospace !important;
        font-size: 10pt !important;
        line-height: 1.2 !important;
        border: none !important;
        border-bottom: 2px solid #000000 !important;
        border-radius: 0 !important;
        padding: 0 0 12px 0 !important;
        margin-bottom: 24px !important;
        background-color: transparent !important;
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: flex-end !important;
      }
      .header-info .meta-left strong {
        color: #000000 !important;
        font-size: 10pt !important;
        text-transform: uppercase !important;
        letter-spacing: normal !important;
      }
      .header-info .meta-left .val-text {
        color: #000000 !important;
        font-size: 10pt !important;
        font-weight: normal !important;
      }
      .header-info .meta-right {
        text-align: right !important;
      }
      .header-info .meta-right .status-tag {
        font-size: 10pt !important;
        font-weight: bold !important;
        background: transparent !important;
        color: #000000 !important;
        padding: 0 !important;
        letter-spacing: normal !important;
        display: inline !important;
      }
      .header-info .meta-right .sys-code {
        font-size: 9pt !important;
        color: #000000 !important;
        font-weight: normal !important;
        display: inline !important;
      }

      .solution-content {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10pt;
        line-height: 1.3;
        text-align: left;
        column-count: 2 !important; 
        column-gap: 40px;
        column-rule: 1px solid #000000; 
      }

      .solution-content table {
        display: table !important;
        overflow-x: visible !important;
        white-space: normal !important;
      }

      .solution-content th, 
      .solution-content td {
        border: 1px solid #000000 !important;
      }

      .solution-content th {
        background-color: #eaeded !important;
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact;
      }

      .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <header class="no-print portal-main-header">
    <h1 class="portal-title">♦EXAM-SOLUTIONS</h1>
    <div class="portal-subtitle">•WAEC | •NECO | •NABTEB | •JAMB</div>
    <a href="https://t.me/your_telegram_group" target="_blank" class="telegram-link">
      ✈ Join Our Telegram Group
    </a>
  </header>

  <div id="admin-actions-wrapper" class="no-print action-header">
    <div class="ict-generator-box">
      <label for="ictCopyCount" style="font-weight:700; color:#475569; font-size:13px;">⚡ ICT Bulk Copy Count:</label>
      <input type="number" id="ictCopyCount" class="ict-input" value="10" min="1" max="200">
      <button onclick="generateAnonymousICTScripts()" class="action-btn btn-ict">
        🔄 Render Unassigned Variants
      </button>
    </div>
    <div class="btn-group">
      <button onclick="exportAllToDocx()" class="action-btn btn-docx">
        📄 Export to Word (.Docx)
      </button>
      <button onclick="window.print()" class="action-btn btn-pdf">
        📕 Save / Print as PDF
      </button>
    </div>
  </div>

  <div id="print-container">
    <p style="color:#666; font-size:14px; font-family: system-ui, -apple-system, sans-serif; text-align: center;">Querying database system records...</p>
  </div>

  <footer class="no-print portal-main-footer">
    EXAM-SOLUTIONS.NETLIFY.APP
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ixncydkmeihhdpvsmjtx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_kILpb-WHjdkpeRXVpeQ2dA_MAMqf5m7";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('examId');
    let fetchedRecordsGlobal = [];
    let backupMasterSubject = "Examination Paper Copy";
    let backupMasterText = "<p>No active solution text structure compiled in database.</p>";

    // Check auth status to show/hide admin panels from public anonymous access paths
    async function evaluateSecurityContext() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      const menu = document.getElementById('admin-actions-wrapper');
      if (session) {
        menu.style.display = 'flex';
      } else {
        menu.style.display = 'none';
      }
    }

    // Helper client-side shuffler to mutate solutions for rapid ICT generation when unassigned
    function executeClientMutationEngine(baseHtml, index) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(baseHtml, 'text/html');
      
      // 1. Mutate Lists (Shuffle list item variations if present)
      doc.querySelectorAll('ul, ol').forEach(list => {
        const items = Array.from(list.children);
        if(items.length > 1 && index % 2 === 0) {
          items.reverse().forEach(item => list.appendChild(item));
        }
      });
      
      // 2. Mutate Table Structures Safely (Alternating row structural layouts)
      doc.querySelectorAll('table').forEach(table => {
        const rows = Array.from(table.querySelectorAll('tbody tr'));
        if (rows.length > 2) {
          // Subtle variance to randomize visual signature
          for (let i = 0; i < rows.length - 1; i += 2) {
            if(rows[i] && rows[i+1] && (index % 3 === 0)) {
              rows[i].parentNode.insertBefore(rows[i+1], rows[i]);
            }
          }
        }
      });

      // 3. Insert subtle non-breaking variant hashes to guarantee unique print layouts
      const paragraphs = doc.querySelectorAll('p, td');
      if(paragraphs.length > 0) {
        const targetCell = paragraphs[index % paragraphs.length];
        targetCell.innerHTML += `<span style="display:none !important; font-size:0px;">[v-${index+1}]</span>`;
      }

      return doc.body.innerHTML;
    }

    // Explicitly fallback and print independent copies directly inside the ICT center
    function generateAnonymousICTScripts() {
      const targetCount = parseInt(document.getElementById('ictCopyCount').value) || 10;
      const container = document.getElementById('print-container');
      
      container.innerHTML = "";
      fetchedRecordsGlobal = []; // Reset global tracking matrix for custom export pipeline

      for (let i = 0; i < targetCount; i++) {
        const mockStudentName = `ICT Candidate Batch (Seat-${String(i + 1).padStart(2, '0')})`;
        const mutatedText = executeClientMutationEngine(backupMasterText, i);

        // Map to global array so Word Exporter matches on-screen changes
        fetchedRecordsGlobal.push({
          unique_solution_text: mutatedText,
          profiles: { full_name: mockStudentName },
          anonymous_sessions: null,
          exams: { subject: backupMasterSubject }
        });

        const sheetHTML = `
          <div class="student-sheet">
            <div class="header-info">
              <div class="meta-left">
                <strong>Candidate Name</strong><br>
                <div class="val-text" style="color: #d97706; font-weight:800;">${mockStudentName}</div>
                <strong style="margin-top: 4px; display:inline-block;">Subject Context</strong><br>
                <div class="val-text" style="font-size:14px; font-weight:600; color:#475569;">${backupMasterSubject}</div>
              </div>
              <div class="meta-right">
                <span class="status-tag" style="background:#fef3c7; color:#b45309;">UNASSIGNED ICT BULK VARIANT</span>
                <span class="sys-code">SYS REGISTERED CODE: EXM-${examId}</span>
              </div>
            </div>
            <div class="solution-content">${mutatedText}</div>
          </div>
        `;
        container.innerHTML += sheetHTML;
      }
    }

    async function fetchAndRenderSolutions() {
      const container = document.getElementById('print-container');
      
      if (!examId) {
        container.innerHTML = "<p style='color:#ef4444; font-size:14px; font-weight:bold; font-family: system-ui, -apple-system, sans-serif; text-align: center;'>Error: No Exam ID parameter targeted in URL route query string.</p>";
        return;
      }

      // Pre-fetch the master exam data to establish fallback variables for unassigned generation
      const { data: baseExam } = await supabaseClient
        .from('exams')
        .select('subject, master_solution_template') // Assuming layout uses master_solution_template or fallback string
        .eq('id', examId)
        .single();

      if (baseExam) {
        backupMasterSubject = baseExam.subject || "Examination Paper Copy";
        // Fallback option matrix
        backupMasterText = baseExam.master_solution_template || "<p>Base Master Template Empty.</p>";
      }

      const { data, error } = await supabaseClient
        .from('mutated_solutions')
        .select(`
          unique_solution_text,
          profiles:student_id ( full_name ),
          anonymous_sessions:session_id ( device_fingerprint ),
          exams:exam_id ( subject, master_solution_template )
        `)
        .eq('exam_id', examId);

      if (error) {
        console.error("Error fetching print records:", error.message);
        container.innerHTML = `<p style='color:#ef4444; font-size:14px; font-family: system-ui, -apple-system, sans-serif; text-align: center;'>Database Query Failure: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div style="background: #fff; padding: 25px; border-radius: 6px; border: 1px solid #e1e1e6; font-family: system-ui, -apple-system, sans-serif; max-width: 1200px; margin: 0 auto; text-align:center;">
            <p style='color:#f59e0b; font-size:15px; font-weight: 600; margin-bottom: 12px;'>No student variations found for this exam layout yet (ID: EXM-${examId}).</p>
            <p style='color:#64748b; font-size:13px; margin-bottom: 16px;'>You can enforce automated generation for physical distribution using the console above.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = "";
      fetchedRecordsGlobal = data;

      // Ensure backup templates hold content from nested data joins if previous single lookups missing
      if(data[0] && data[0].exams) {
        const exObj = Array.isArray(data[0].exams) ? data[0].exams[0] : data[0].exams;
        if(exObj?.master_solution_template) backupMasterText = exObj.master_solution_template;
      }

      data.forEach(record => {
        let studentName = "";
        if (record.profiles) {
          const profileData = Array.isArray(record.profiles) ? record.profiles[0] : record.profiles;
          studentName = profileData?.full_name || "";
        }
        
        if (!studentName && record.anonymous_sessions) {
          const sessionData = Array.isArray(record.anonymous_sessions) ? record.anonymous_sessions[0] : record.anonymous_sessions;
          if (sessionData?.device_fingerprint) {
            studentName = `Anon Device (${String(sessionData.device_fingerprint).substring(0, 8)})`;
          }
        }
        
        if (!studentName || studentName === "undefined") {
          studentName = "Unregistered Device Profile";
        }

        let subjectName = "";
        if (record.exams) {
          const examData = Array.isArray(record.exams) ? record.exams[0] : record.exams;
          subjectName = examData?.subject || "";
        }
        
        if (!subjectName || subjectName === "undefined") {
          subjectName = "Examination Paper Copy";
        }

        const solutionText = record.unique_solution_text || "<p>No solution text written.</p>";

        const sheetHTML = `
          <div class="student-sheet">
            <div class="header-info">
              <div class="meta-left">
                <strong>Candidate Name</strong><br>
                <div class="val-text">${studentName}</div>
                <strong style="margin-top: 4px; display:inline-block;">Subject Context</strong><br>
                <div class="val-text" style="font-size:14px; font-weight:600; color:#475569;">${subjectName}</div>
              </div>
              <div class="meta-right">
                <span class="status-tag">EXAMINATION ARCHITECTURE STATUS</span>
                <span class="sys-code">SYS REGISTERED CODE: EXM-${examId}</span>
              </div>
            </div>
            <div class="solution-content">${solutionText}</div>
          </div>
        `;
        container.innerHTML += sheetHTML;
      });
    }
    

    // Dynamic Word Generation Logic Matrix
    function exportAllToDocx() {
      if (!fetchedRecordsGlobal || fetchedRecordsGlobal.length === 0) {
        alert("Error: No loaded data structures available to convert.");
        return;
      }

      let docHtmlBody = "";

      fetchedRecordsGlobal.forEach((record, index) => {
        let studentName = "";
        if (record.profiles) {
          const profileData = Array.isArray(record.profiles) ? record.profiles[0] : record.profiles;
          studentName = profileData?.full_name || "";
        }
        if (!studentName && record.anonymous_sessions) {
          const sessionData = Array.isArray(record.anonymous_sessions) ? record.anonymous_sessions[0] : record.anonymous_sessions;
          if (sessionData?.device_fingerprint) {
            studentName = `Anon Device (${String(sessionData.device_fingerprint).substring(0, 8)})`;
          }
        }
        if (!studentName || studentName === "undefined") {
          studentName = "Unregistered Device Profile";
        }

        let subjectName = "";
        if (record.exams) {
          const examData = Array.isArray(record.exams) ? record.exams[0] : record.exams;
          subjectName = examData?.subject || "";
        }
        if (!subjectName || subjectName === "undefined") {
          subjectName = "Examination Paper Copy";
        }

        let solutionContentRaw = record.unique_solution_text || "<p>No solution text written.</p>";

        const parser = new DOMParser();
        const subDoc = parser.parseFromString(solutionContentRaw, 'text/html');
        
        subDoc.querySelectorAll('table').forEach(table => {
          table.setAttribute('border', '1');
          table.setAttribute('cellspacing', '0');
          table.setAttribute('cellpadding', '6');
          table.setAttribute('style', 'border-collapse:collapse; width:100%; border:1px solid #000000; margin:14px 0;');
          
          table.querySelectorAll('th, td').forEach(cell => {
            cell.setAttribute('style', 'border:1px solid #000000; padding:6px 10px; font-family:"Courier New"; font-size:10pt;');
          });
          table.querySelectorAll('th').forEach(th => {
            th.setAttribute('style', 'border:1px solid #000000; padding:6px 10px; background-color:#eaeded; font-weight:bold; font-family:"Courier New"; font-size:10pt;');
          });
        });

        subDoc.querySelectorAll('img').forEach(img => {
          img.setAttribute('style', 'max-width:100%; width:auto; height:auto; display:block; margin:8px 0;');
        });
        
        const optimizedHTMLContent = subDoc.body.innerHTML;
        const pageBreak = index > 0 ? '<br clear="all" style="page-break-before:always; break-before:page;"/>' : '';

        // Safe Standard Native Word Format Table Headers (Clean layout for Docx exports)
        docHtmlBody += `
          ${pageBreak}
          <table width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse; border-bottom:2.5pt solid #000000; margin-bottom:24px; padding-bottom:8px; font-family:'Courier New'; font-size:10.5pt;">
            <tr>
              <td align="left" valign="bottom" style="border:none; padding:0; text-transform:uppercase; font-family:'Courier New';">
                <strong>Candidate Name:</strong> ${studentName}<br/>
                <strong>Subject Context:</strong> ${subjectName}
              </td>
              <td align="right" valign="bottom" style="border:none; padding:0; text-align:right; font-family:'Courier New';">
                <strong>EXAMINATION ARCHITECTURE STATUS</strong><br/>
                <span style="font-size:9pt; color:#444444;">SYS REGISTERED CODE: EXM-${examId}</span>
              </td>
            </tr>
          </table>

          <div class="word-two-column">
            ${optimizedHTMLContent}
          </div>
        `;
      });

      const docxHeader = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
      <head>
        <title>Master Solution Export</title>
        <style>
          @page {
            size: 21.0cm 29.7cm;
