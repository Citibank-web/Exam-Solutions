<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export All Student Solutions</title>
  <style>
    /* Global styling for screen preview */
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #f4f4f6;
      margin: 0;
      padding: 16px;
      color: #1e293b;
    }
    
    /* Individual student sheet container */
    .student-sheet {
      background: #ffffff;
      padding: 32px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .header-info {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      border-bottom: 2px solid #1e293b;
      padding-bottom: 12px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 16px;
      line-height: 1.3;
    }

    .solution-content {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      line-height: 1.4;
      text-align: left;
      column-count: 2;
      column-gap: 40px;
      column-rule: 1px solid #cbd5e1;
    }

    .solution-content p, 
    .solution-content ul, 
    .solution-content ol,
    .solution-content img {
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 12px;
    }

    .solution-content img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .solution-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .solution-content th, 
    .solution-content td {
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      text-align: left;
    }

    .solution-content th {
      background-color: #f8fafc;
      font-weight: 700;
    }

    .solution-content tr:nth-child(even) {
      background-color: #f8fafc;
    }

    .action-header {
      margin-bottom: 24px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .action-btn {
      padding: 12px 24px; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold; 
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn-docx {
      background: #10b981; 
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .btn-docx:hover { background: #059669; }

    .btn-pdf {
      background: #ef4444; 
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    }

    .btn-pdf:hover { background: #dc2626; }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .action-header { flex-direction: column; text-align: center; margin-bottom: 16px; }
      .action-btn { width: 100%; }
      .student-sheet { padding: 20px; margin-bottom: 16px; }
      .header-info { flex-direction: column; justify-content: flex-start; gap: 8px; }
      .header-info div:last-child { text-align: left !important; }
      .solution-content { column-count: 1; column-rule: none; }
      .solution-content table { display: block; width: 100%; overflow-x: auto; white-space: nowrap; }
    }

    /* ==========================================================================
       HIGH-FIDELITY PDF/PRINT COMPILER ENGINE OVERRIDES
       ========================================================================== */
    @media print {
      @page {
        size: A4 portrait;
        margin: 15mm;
      }

      body {
        font-family: 'Courier New', Courier, monospace;
        background-color: #ffffff;
        padding: 0;
        color: #000000;
      }
      
      .student-sheet {
        border: none;
        padding: 0;
        margin: 0;
        box-shadow: none;
        page-break-after: always; 
        break-after: page;
        width: 100%;
      }

      .header-info {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10pt;
        line-height: 1.2;
        border-bottom: 2px solid #000000;
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
      }

      .header-info div:last-child {
        text-align: right !important;
      }

      .solution-content {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10pt;
        line-height: 1.3;
        text-align: left;
        column-count: 2 !important; 
        column-gap: 40px;
        column-rule: 1px solid #000000; 
      }

      .solution-content table {
        display: table !important;
        overflow-x: visible !important;
        white-space: normal !important;
      }

      .solution-content th, 
      .solution-content td {
        border: 1px solid #000000 !important;
      }

      .solution-content th {
        background-color: #eaeded !important;
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact;
      }

      .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="no-print action-header">
    <button onclick="exportAllToDocx()" class="action-btn btn-docx">
      📄 Export to Word (.Docx)
    </button>
    <button onclick="window.print()" class="action-btn btn-pdf">
      📕 Save / Print as PDF
    </button>
  </div>

  <div id="print-container">
    <p style="color:#666; font-size:14px; font-family: system-ui, -apple-system, sans-serif;">Querying database system records...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ixncydkmeihhdpvsmjtx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_kILpb-WHjdkpeRXVpeQ2dA_MAMqf5m7";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('examId');
    let fetchedRecordsGlobal = [];

    async function fetchAndRenderSolutions() {
      const container = document.getElementById('print-container');
      
      if (!examId) {
        container.innerHTML = "<p style='color:#ef4444; font-size:14px; font-weight:bold; font-family: system-ui, -apple-system, sans-serif;'>Error: No Exam ID parameter targeted in URL route query string.</p>";
        return;
      }

      const { data, error } = await supabaseClient
        .from('mutated_solutions')
        .select(`
          unique_solution_text,
          profiles:student_id ( full_name ),
          exams:exam_id ( subject )
        `)
        .eq('exam_id', examId);

      if (error) {
        console.error("Error fetching print records:", error.message);
        container.innerHTML = `<p style='color:#ef4444; font-size:14px; font-family: system-ui, -apple-system, sans-serif;'>Database Query Failure: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div style="background: #fff; padding: 25px; border-radius: 6px; border: 1px solid #e1e1e6; font-family: system-ui, -apple-system, sans-serif; max-width: 1200px; margin: 0 auto;">
            <p style='color:#f59e0b; font-size:15px; font-weight: 600; margin-bottom: 8px;'>No student variations found for this exam layout yet (ID: EXM-${examId}).</p>
          </div>
        `;
        return;
      }

      container.innerHTML = "";
      fetchedRecordsGlobal = data;

      data.forEach(record => {
        const studentName = record.profiles?.full_name || "Unknown Candidate";
        const subjectName = record.exams?.subject || "Examination Paper Copy";
        const solutionText = record.unique_solution_text || "<p>No solution text written.</p>";

        const sheetHTML = `
          <div class="student-sheet">
            <div class="header-info">
              <div>
                <strong style="text-transform: uppercase;">Candidate Name:</strong> ${studentName}<br>
                <strong style="text-transform: uppercase;">Subject Context:</strong> ${subjectName}
              </div>
              <div style="text-align: right;">
                <strong>EXAMINATION ARCHITECTURE STATUS</strong><br>
                <span style="font-size: 9pt; color:#666;">SYS REGISTERED CODE: EXM-${examId}</span>
              </div>
            </div>
            <div class="solution-content">${solutionText}</div>
          </div>
        `;
        container.innerHTML += sheetHTML;
      });
    }

    // Dynamic Word Generation Logic Matrix
    function exportAllToDocx() {
      if (!fetchedRecordsGlobal || fetchedRecordsGlobal.length === 0) {
        alert("Error: No loaded data structures available to convert.");
        return;
      }

      let docHtmlBody = "";

      fetchedRecordsGlobal.forEach((record, index) => {
        const studentName = record.profiles?.full_name || "Unknown Candidate";
        const subjectName = record.exams?.subject || "Examination Paper Copy";
        let solutionContentRaw = record.unique_solution_text || "<p>No solution text written.</p>";

        const parser = new DOMParser();
        const subDoc = parser.parseFromString(solutionContentRaw, 'text/html');
        
        subDoc.querySelectorAll('table').forEach(table => {
          table.setAttribute('border', '1');
          table.setAttribute('cellspacing', '0');
          table.setAttribute('cellpadding', '6');
          table.setAttribute('style', 'border-collapse:collapse; width:100%; border:1px solid #000000; margin:14px 0;');
          
          table.querySelectorAll('th, td').forEach(cell => {
            cell.setAttribute('style', 'border:1px solid #000000; padding:6px 10px; font-family:"Courier New"; font-size:10pt;');
          });
          table.querySelectorAll('th').forEach(th => {
            th.setAttribute('style', 'border:1px solid #000000; padding:6px 10px; background-color:#eaeded; font-weight:bold; font-family:"Courier New"; font-size:10pt;');
          });
        });

        subDoc.querySelectorAll('img').forEach(img => {
          img.setAttribute('style', 'max-width:100%; width:auto; height:auto; display:block; margin:8px 0;');
        });
        
        const optimizedHTMLContent = subDoc.body.innerHTML;
        const pageBreak = index > 0 ? '<br clear="all" style="page-break-before:always; break-before:page;"/>' : '';

        docHtmlBody += `
          ${pageBreak}
          <table width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse; border-bottom:2.5pt solid #000000; margin-bottom:24px; padding-bottom:8px; font-family:'Courier New'; font-size:10.5pt;">
            <tr>
              <td align="left" valign="bottom" style="border:none; padding:0; text-transform:uppercase; font-family:'Courier New';">
                <strong>Candidate Name:</strong> ${studentName}<br/>
                <strong>Subject Context:</strong> ${subjectName}
              </td>
              <td align="right" valign="bottom" style="border:none; padding:0; text-align:right; font-family:'Courier New';">
                <strong>EXAMINATION ARCHITECTURE STATUS</strong><br/>
                <span style="font-size:9pt; color:#444444;">SYS REGISTERED CODE: EXM-${examId}</span>
              </td>
            </tr>
          </table>

          <div class="word-two-column">
            ${optimizedHTMLContent}
          </div>
        `;
      });

      const docxHeader = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
      <head>
        <title>Master Solution Export</title>
        <style>
          @page {
            size: 21.0cm 29.7cm; 
            margin: 1.5cm 1.5cm 1.5cm 1.5cm;
          }
          body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10pt;
            color: #000000;
          }
          div.word-two-column {
            margin:0in;
            margin-bottom:.0001pt;
            mso-element:section;
            page-break-before:auto;
            mso-section-break-type:continuous;
            mso-columns:2 20.0pt; 
          }
          p, li {
            margin:0in;
            margin-bottom:8pt;
            font-family:'Courier New';
            font-size:10pt;
            line-height:1.3;
          }
          img { max-width: 100%; }
        </style>
      </head>
      <body>`;
      
      const docxFooter = "</body></html>";
      const finalSourceHTML = docxHeader + docHtmlBody + docxFooter;

      const blob = new Blob(['\ufeff' + finalSourceHTML], {
        type: 'application/msword'
      });

      const downloadUrl = URL.createObjectURL(blob);
      const tempAnchor = document.createElement('a');
      tempAnchor.href = downloadUrl;
      tempAnchor.download = `Exam_EXM-${examId}_Exact_Compiled_Solutions.docx`;
      document.body.appendChild(tempAnchor);
      tempAnchor.click();
      document.body.removeChild(tempAnchor);
      URL.revokeObjectURL(downloadUrl);
    }

    fetchAndRenderSolutions();
  </script>
</body>
  </html>
