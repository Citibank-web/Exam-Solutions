<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print All Student Solutions</title>
  <style>
    /* Global styling for screen preview */
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #f4f4f6;
      margin: 0;
      padding: 16px;
      color: #1e293b;
    }
    
    /* Individual student sheet container */
    .student-sheet {
      background: #ffffff;
      padding: 32px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .header-info {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      border-bottom: 2px solid #1e293b;
      padding-bottom: 12px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 16px;
      line-height: 1.3;
    }

    .solution-content {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      line-height: 1.4;
      text-align: left;
      
      /* Responsive Screen Columns: 2 Columns on desktop, 1 on mobile */
      column-count: 2;
      column-gap: 40px;
      column-rule: 1px solid #cbd5e1;
    }

    /* Keep individual semantic blocks together across columns */
    .solution-content p, 
    .solution-content ul, 
    .solution-content ol,
    .solution-content img {
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 12px;
    }

    /* Auto-scale embedded document images perfectly within columns */
    .solution-content img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* ==========================================================================
       Mammoth Document Table Grid Layout Styling Fixes
       ========================================================================== */
    .solution-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .solution-content th, 
    .solution-content td {
      border: 1px solid #cbd5e1; /* Smooth grey border line */
      padding: 8px 12px;
      text-align: left;
    }

    .solution-content th {
      background-color: #f8fafc;
      font-weight: 700;
    }

    .solution-content tr:nth-child(even) {
      background-color: #f8fafc; /* Subtle zebra striping */
    }

    /* Print control button container design alignment */
    .action-header {
      margin-bottom: 24px;
      text-align: right;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .print-trigger-btn {
      padding: 12px 24px; 
      background: #0070f3; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold; 
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      transition: background 0.2s ease;
      box-shadow: 0 4px 12px rgba(0, 112, 243, 0.2);
    }

    .print-trigger-btn:hover {
      background: #0056b3;
    }

    /* ==========================================================================
       Mobile-First Screen Breakpoints 
       ========================================================================== */
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      
      .action-header {
        text-align: center;
        margin-bottom: 16px;
      }

      .print-trigger-btn {
        width: 100%;
        max-width: 400px;
      }

      .student-sheet {
        padding: 20px;
        margin-bottom: 16px;
      }

      .header-info {
        flex-direction: column; /* Stack header details vertically on small screens */
        justify-content: flex-start;
        gap: 8px;
      }

      .header-info div:last-child {
        text-align: left !important;
      }

      .solution-content {
        column-count: 1; /* Fallback to single fluid column for easy phone scanning */
        column-rule: none;
      }

      /* Make tables scroll horizontally on mobile screens instead of breaking containers */
      .solution-content table {
        display: block;
        width: 100%;
        overflow-x: auto;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* ==========================================================================
       THE PRINT ENGINE: This activates ONLY when outputting to hard-copy or PDF
       ========================================================================== */
    @media print {
      @page {
        size: A4 portrait;
        margin: 15mm;
      }

      body {
        font-family: 'Courier New', Courier, monospace;
        background-color: #ffffff;
        padding: 0;
        color: #000000;
      }
      
      .student-sheet {
        border: none;
        padding: 0;
        margin: 0;
        box-shadow: none;
        /* Forces the printer to start a brand new page after this block */
        page-break-after: always; 
        break-after: page;
        width: 100%;
      }

      .header-info {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10pt;
        line-height: 1.2;
        border-bottom: 2px solid #000000;
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
      }

      .header-info div:last-child {
        text-align: right !important;
      }

      .solution-content {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10pt;
        line-height: 1.2;
        text-align: left;
        column-count: 2 !important; /* Strict restoration of two column print system */
        column-gap: 40px;
        column-rule: 1px solid #000000; /* Crisp black line for printers */
      }

      /* Reset table block display settings for physical prints */
      .solution-content table {
        display: table !important;
        overflow-x: visible !important;
        white-space: normal !important;
      }

      /* Strict high-contrast black gridlines when printing onto paper */
      .solution-content th, 
      .solution-content td {
        border: 1px solid #000000 !important;
      }

      .solution-content th {
        background-color: #eaeded !important;
        -webkit-print-color-adjust: exact; /* Force engines to honor table background shading */
        print-color-adjust: exact;
      }

      /* Hide any action buttons (like a print button) on the paper copy */
      .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="no-print action-header">
    <button onclick="window.print()" class="print-trigger-btn">
      Confirm & Print All Sheets
    </button>
  </div>

  <div id="print-container">
    <p style="color:#666; font-size:14px; font-family: system-ui, -apple-system, sans-serif;">Querying database system records...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ixncydkmeihhdpvsmjtx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_kILpb-WHjdkpeRXVpeQ2dA_MAMqf5m7";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Get the exam ID from the URL string
    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('examId');

    async function fetchAndRenderSolutions() {
      const container = document.getElementById('print-container');
      
      if (!examId) {
        container.innerHTML = "<p style='color:#ef4444; font-size:14px; font-weight:bold; font-family: system-ui, -apple-system, sans-serif;'>Error: No Exam ID parameter targeted in URL route query string.</p>";
        return;
      }

      // Modified table reference points selection matching exactly to your declared schema foreign keys
      const { data, error } = await supabaseClient
        .from('mutated_solutions')
        .select(`
          unique_solution_text,
          profiles:student_id ( full_name ),
          exams:exam_id ( subject )
        `)
        .eq('exam_id', examId);

      if (error) {
        console.error("Error fetching print records:", error.message);
        container.innerHTML = `<p style='color:#ef4444; font-size:14px; font-family: system-ui, -apple-system, sans-serif;'>Database Query Failure: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div style="background: #fff; padding: 25px; border-radius: 6px; border: 1px solid #e1e1e6; font-family: system-ui, -apple-system, sans-serif; max-width: 1200px; margin: 0 auto;">
            <p style='color:#f59e0b; font-size:15px; font-weight: 600; margin-bottom: 8px;'>No student variations found for this exam layout yet (ID: EXM-${examId}).</p>
            <p style='color:#666; font-size:13px; line-height: 1.5;'>
              <strong>Troubleshooting Actions Required:</strong><br>
              1. Go back to your Admin Dashboard Page.<br>
              2. Select this exam under <strong>Step 1</strong> to put it into Edit Mode view.<br>
              3. Check that students have been assigned to this exam under <strong>Step 2</strong>.<br>
              4. Click on the yellow <strong>"Launch Variation Generation Run 🚀"</strong> button inside the terminal block.<br>
              5. Once the terminal log prints success flags, refresh this print tab.
            </p>
          </div>
        `;
        return;
      }

      // Clear loading message state completely
      container.innerHTML = "";

      // Loop through each student's row and generate their dedicated block
      data.forEach(record => {
        const studentName = record.profiles?.full_name || "Unknown Candidate";
        const subjectName = record.exams?.subject || "Examination Paper Copy";
        const solutionText = record.unique_solution_text || "<p>No solution text written.</p>";

        const sheetHTML = `
          <div class="student-sheet">
            <div class="header-info">
              <div>
                <strong style="text-transform: uppercase;">Candidate Name:</strong> ${studentName}<br>
                <strong style="text-transform: uppercase;">Subject Context:</strong> ${subjectName}
              </div>
              <div style="text-align: right;">
                <strong>EXAMINATION ARCHITECTURE STATUS</strong><br>
                <span style="font-size: 9pt; color:#666;">SYS REGISTERED CODE: EXM-${examId}</span>
              </div>
            </div>
            <div class="solution-content">${solutionText}</div>
          </div>
        `;
        container.innerHTML += sheetHTML;
      });
    }

    // Initialize execution run
    fetchAndRenderSolutions();
  </script>
</body>
</html>
