<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solution Room - Exam Portal</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================================================
       Premium Light Theme CSS Design System (Heavily Redesigned)
       ========================================================================== */
    :root {
      --bg-main: #f8fafc;
      --bg-workspace: #f1f5f9;
      --panel-bg: #ffffff;
      --text-main: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-subtle: #f5f3ff;
      --border: #e2e8f0;
      --border-focus: #cbd5e1;
      
      --success: #059669;
      --success-bg: #f0fdf4;
      --success-border: #bbf7d0;
      
      --loading-text: #2563eb;
      --loading-bg: #eff6ff;
      --loading-border: #bfdbfe;
      
      --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.05);
      --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.04), 0 8px 10px -6px rgba(15, 23, 42, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Navigation Toolbar */
    .top-bar {
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 80px;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .brand-wrapper {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .portal-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      border-radius: 12px;
      color: #ffffff;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }

    .top-bar h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-back {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
    }

    .btn-back:hover {
      background: #f8fafc;
      color: var(--accent);
      border-color: #cbd5e1;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    /* ==========================================================================
       The Split Panel Layout (CSS Grid)
       ========================================================================== */
    .exam-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      height: calc(100vh - 80px);
      padding: 32px 40px;
      width: 100vw;
      background: var(--bg-workspace);
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Elegant Top Border Line Accents to Distinguish Workspace Panes */
    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
    
    .question-panel::before {
      background: linear-gradient(90deg, #94a3b8 0%, #cbd5e1 100%);
    }
    
    .solution-panel::before {
      background: linear-gradient(90deg, var(--accent) 0%, #818cf8 100%);
    }

    .panel-header-wrapper {
      display: flex;
      flex-direction: column;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
    }

    .panel h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 800;
    }

    /* Content Area Typography & Card Wrappers */
    .paper-card {
      background: #fdfdfd;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 24px;
      flex-grow: 1;
      overflow-y: auto;
    }

    .content-box {
      font-size: 16px;
      line-height: 1.85;
      color: var(--text-secondary);
      font-weight: 450;
      letter-spacing: -0.005em;
    }

    /* Retain breaks on the plaintext question box only */
    #question-box {
      white-space: pre-wrap; 
    }

    /* Auto-scale embedded layout assets and diagrams extracted from docx sheets */
    .content-box img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 12px 0;
      box-shadow: var(--shadow-sm);
      display: block;
    }

    /* ==========================================================================
       Mammoth Document Table Grid Layout Styling Fixes
       ========================================================================== */
    .content-box table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 15px;
      background: #ffffff;
      box-shadow: var(--shadow-sm);
    }

    .content-box th, 
    .content-box td {
      border: 1px solid #cbd5e1;
      padding: 10px 14px;
      text-align: left;
    }

    .content-box th {
      background-color: #f8fafc;
      font-weight: 700;
      color: var(--text-main);
    }

    .content-box tr:nth-child(even) {
      background-color: #f8fafc;
    }

    /* Custom Scrollbar Presentation Styling */
    .panel::-webkit-scrollbar, .paper-card::-webkit-scrollbar {
      width: 8px;
    }
    .panel::-webkit-scrollbar-track, .paper-card::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel::-webkit-scrollbar-thumb, .paper-card::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 99px;
    }
    .panel::-webkit-scrollbar-thumb:hover, .paper-card::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }

    /* ==========================================================================
       Security Layer & Status Badges
       ========================================================================== */
    .secure-text {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    /* Premium Generation Alert Status Framework */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      align-self: flex-start;
      box-shadow: var(--shadow-sm);
    }

    .status-badge.loading {
      background: var(--loading-bg);
      border-color: var(--loading-border);
      color: var(--loading-text);
      animation: pulse-opac 2s infinite ease-in-out;
    }

    @keyframes pulse-opac {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }

    /* ==========================================================================
       Mobile Optimization Adaptive Layer Queries
       ========================================================================== */
    @media (max-width: 1024px) {
      body {
        overflow-y: auto;
        height: auto;
      }
      
      .top-bar {
        position: sticky;
        top: 0;
        padding: 0 16px;
        height: 72px;
      }

      .exam-container {
        grid-template-columns: 1fr;
        height: auto;
        padding: 8px;
        gap: 12px;
      }

      .panel {
        padding: 18px 14px;
        border-radius: 12px;
        min-height: 48vh;
        height: auto;
        overflow-y: visible;
      }

      .panel::before {
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
      }
      
      .paper-card {
        overflow-y: visible;
        padding: 16px 12px;
      }
    }

    /* ==========================================================================
       Workspace Print Output Configurations
       ========================================================================== */
    @media print {
      .top-bar {
        display: none !important;
      }
      body {
        background: #ffffff;
        height: auto;
        overflow: visible;
      }
      .exam-container {
        display: block;
        padding: 0;
        background: none;
        height: auto;
      }
      .panel {
        border: none;
        box-shadow: none;
        padding: 0;
        margin-bottom: 40px;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .panel::before {
        display: none;
      }
      .paper-card {
        border: none;
        padding: 0;
      }
      .content-box th, 
      .content-box td {
        border: 1px solid #000000 !important;
      }
    }
  </style>
</head>
<body>

  <header class="top-bar">
    <div class="brand-wrapper">
      <div class="portal-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
      </div>
      <h1 id="exam-header-title">Loading Workspace Panel...</h1>
    </div>
    <a href="dashboard.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Return to Dashboard
    </a>
  </header>

  <main class="exam-container">
    
    <section class="panel question-panel">
      <div class="panel-header-wrapper">
        <h2>Exam Question</h2>
      </div>
      <div class="paper-card">
        <div id="question-box" class="content-box">Synchronizing question data...</div>
      </div>
    </section>
    
    <section class="panel solution-panel">
      <div class="panel-header-wrapper">
        <h2>Your Unique Solution</h2>
        <div id="badge-zone"></div>
      </div>
      <div class="paper-card">
        <div id="solution-box" class="content-box secure-text">Accessing secure solution profile vaults...</div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ixncydkmeihhdpvsmjtx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_kILpb-WHjdkpeRXVpeQ2dA_MAMqf5m7";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM Pointer Objects
    const examHeaderTitle = document.getElementById('exam-header-title');
    const questionBox = document.getElementById('question-box');
    const solutionBox = document.getElementById('solution-box');
    const badgeZone = document.getElementById('badge-zone');

    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('examId');

    let loggedInStudent = null;
    let masterExamData = null;

    // 1. Initial State Authentication Gateway Verification Check
    async function initWorkspace() {
      if (!examId) {
        alert("Fatal Error: Active Exam Reference ID code missing.");
        window.location.href = "dashboard.html";
        return;
      }

      const { data: { user }, error } = await supabaseClient.auth.getUser();
      if (error || !user) {
        window.location.href = "index.html";
        return;
      }
      loggedInStudent = user;

      loadExamAndSolutionData();
    }

    // 2. Synchronized Double-Lookup Retrieval Matrix Logic Block
    async function loadExamAndSolutionData() {
      const { data: exam, error: examError } = await supabaseClient
        .from('exams')
        .select('id, subject, master_question')
        .eq('id', examId)
        .single();

      if (examError || !exam) {
        questionBox.innerText = "Access Denied: You are not authorized or this exam structure layout row does not exist.";
        solutionBox.innerHTML = "Operation terminated.";
        return;
      }
      masterExamData = exam;
      examHeaderTitle.innerText = `${exam.subject} — Workspace Interface Room`;
      questionBox.innerText = exam.master_question;

      const { data: solutionCache, error: cacheError } = await supabaseClient
        .from('mutated_solutions')
        .select('unique_solution_text')
        .eq('exam_id', examId)
        .eq('student_id', loggedInStudent.id)
        .maybeSingle();

      if (solutionCache) {
        // Cache Hit: Render unique solution string directly into rich HTML view format
        badgeZone.innerHTML = `<div class="status-badge">✓ Secure Assigned Copy Synced</div>`;
        solutionBox.innerHTML = solutionCache.unique_solution_text;
      } else {
        // Cache Miss: Run the generation and mutation cycle protocol loop
        generateUniqueSolutionVariation();
      }
    }

    // 3. Fallback Paraphrasing & Structure Shuffling Simulation Engine
    function simulateAIMutationEngine(masterText) {
      // If the incoming master text contains HTML tags (parsed via mammoth), skip manual text replacement
      // to keep base64 image strings and tag configurations pristine.
      if (masterText.trim().startsWith('<') || masterText.includes('</')) {
        return masterText; 
      }

      const transitions = [
        ["Therefore,", "Consequently,", "As a direct result,", "Hence, it follows that,"],
        ["To find the", "In order to calculate the", "To solve for the", "Evaluating the value of"],
        ["We can observe that", "It is evident that", "Analysis indicates that", "We see that"],
        ["Substituting the numbers,", "Placing these parameters down,", "Plugging these values into our expression,"]
      ];
      
      let modifiedText = masterText;
      
      transitions.forEach(pool => {
        const primaryKeyword = pool[0];
        const randomAlternative = pool[Math.floor(Math.random() * pool.length)];
        const escapeRegex = primaryKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        modifiedText = modifiedText.replace(new RegExp(escapeRegex, 'g'), randomAlternative);
      });
      
      const structuralDecorators = [
        `\n\n[Step-by-step verification methodology complete.]`,
        `\n\nValues completely evaluated and checked against primary metrics.`,
        `\n\nShowing all structural operational metrics as requested.`
      ];
      modifiedText += structuralDecorators[Math.floor(Math.random() * structuralDecorators.length)];
      
      return modifiedText;
    }

    // 4. Mutation Execution Controller Processing Function Loop 
    async function generateUniqueSolutionVariation() {
      badgeZone.innerHTML = `<div class="status-badge loading">⏳ Formulating Unique Copy Variant...</div>`;
      
      const { data: securePayload, error: coreFetchError } = await supabaseClient
        .rpc('get_master_solution_securely', { target_exam_id: parseInt(examId) });

      let masterSolutionText = "";

      if (coreFetchError || !securePayload) {
        const { data: directExam, error: directError } = await supabaseClient
          .from('exams')
          .select('master_solution')
          .eq('id', examId)
          .single();
          
        if (directError || !directExam) {
          solutionBox.innerHTML = "Security Engine Error: Master solution extraction protocol blocked.";
          return;
        }
        masterSolutionText = directExam.master_solution;
      } else {
        masterSolutionText = securePayload;
      }

      const uniqueStudentCopy = simulateAIMutationEngine(masterSolutionText);

      const { error: insertError } = await supabaseClient
        .from('mutated_solutions')
        .insert([
          {
            student_id: loggedInStudent.id,
            exam_id: parseInt(examId),
            unique_solution_text: uniqueStudentCopy
          }
        ]);

      if (insertError) {
        console.error("Cache preservation drop state failed:", insertError.message);
      }

      badgeZone.innerHTML = `<div class="status-badge">✓ Unique Copy Generated & Saved</div>`;
      solutionBox.innerHTML = uniqueStudentCopy;
    }

    // Trigger Core Initialization Routine 
    initWorkspace();
  </script>
</body>
</html>
