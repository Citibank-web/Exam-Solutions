  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          boxShadow: {
            'cosmic': '0 4px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1)',
            'cosmic-hover': '0 10px 40px rgba(99, 102, 241, 0.15), 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2)',
            'glow': '0 0 15px rgba(99, 102, 241, 0.5)'
          },
          animation: {
            'spin-slow': 'spin 120s linear infinite',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes buttonShimmer {
      0% { left: -100%; }
      30%, 100% { left: 150%; }
    }
    .animate-shimmer::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-25deg);
      animation: buttonShimmer 4s infinite linear;
    }
    
    html, body {
      max-width: 100vw;
      width: 100vw;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    input, button {
      font-size: 16px !important;
      touch-action: manipulation;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .solution-content {
      background-color: #ffffff;
      color: #1e293b;
      padding: 0.25rem;
      width: 100%;
      box-sizing: border-box;
    }
    
    .solution-content h3 {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #0f172a;
      margin-bottom: 0.75rem;
      margin-top: 0.5rem;
      border-bottom: 2px solid #cbd5e1;
      padding-bottom: 0.25rem;
    }
    .solution-content p {
      font-size: 0.825rem;
      color: #334155;
      line-height: 1.5;
      margin-bottom: 1rem;
    }
    
    .solution-content table {
      width: 100% !important;
      max-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 1rem 0;
      font-size: 0.75rem;
      table-layout: fixed;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
    }
    .solution-content th, .solution-content td {
      width: 50%;
      border-bottom: 1px solid #cbd5e1;
      border-right: 1px solid #cbd5e1;
      padding: 8px 10px;
      word-wrap: break-word;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }
    .solution-content th:last-child, .solution-content td:last-child {
      border-right: none;
    }
    .solution-content tr:last-child td {
      border-bottom: none;
    }
    .solution-content th { 
      background-color: #f1f5f9; 
      color: #0f172a; 
      font-weight: 700; 
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .solution-content td { color: #334155; font-weight: 500; }
    .solution-content tr:nth-child(even) { background-color: #f8fafc; }

    @media print {
      html, body { overflow: auto !important; height: auto !important; }
      .no-print { display: none !important; }
      .print-card { background: #ffffff !important; border: none !important; box-shadow: none !important; padding: 0 !important; width: 100% !important; color: #000000 !important; }
      .solution-content table, .solution-content th, .solution-content td { border: 1px solid #000000 !important; color: #000000 !important; }
    }
  </style>
</head>

  <!-- Isolated Scrolling Content Matrix Panel -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ixncydkmeihhdpvsmjtx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_kILpb-WHjdkpeRXVpeQ2dA_MAMqf5m7";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getDeviceFingerprint() {
      const signature = window.navigator.userAgent + window.navigator.language + window.screen.colorDepth + window.screen.width;
      let hash = 0;
      for (let i = 0; i < signature.length; i++) { hash = (hash << 5) - hash + signature.charCodeAt(i); hash |= 0; }
      return "DEV-" + Math.abs(hash);
    }

    function getCachedExam(examId) {
      try {
        const cached = localStorage.getItem(`exam_cache_${examId}`);
        return cached ? JSON.parse(cached) : null;
      } catch (e) { return null; }
    }

    function setExamCache(examId, subject, uniqueText, examPin) {
      try {
        localStorage.setItem(`exam_cache_${examId}`, JSON.stringify({ subject, uniqueText, examPin, timestamp: Date.now() }));
      } catch (e) {}
    }

    function renderContentLayout(subject, examId, uniqueText, examPin) {
      const container = document.getElementById('print-container');
      const formattedPin = examPin ? examPin : "UNASSIGNED / ANONYMOUS VARIANT";
      
      container.innerHTML = `
        <div class="print-card w-full flex flex-col gap-4 box-border pb-6">
          <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-xl p-4 sm:p-5 shadow-cosmic flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 box-border">
            <div class="space-y-2 w-full sm:w-auto">
              <div>
                <span class="block text-[9px] font-bold uppercase tracking-widest text-slate-500">Candidate Reference</span>
                <div class="text-xs font-bold text-white">${examPin ? 'Verified Premium Access' : 'Anonymous Dynamic Profile'}</div>
              </div>
              <div>
                <span class="block text-[9px] font-bold uppercase tracking-widest text-slate-500">Subject Context</span>
                <div class="text-base font-extrabold text-slate-200 tracking-tight">${subject}</div>
                <div class="mt-1 flex items-center gap-1.5">
                  <span class="text-[9px] font-bold uppercase tracking-widest text-amber-500/80">Exam PIN:</span>
                  <span class="text-sm font-black text-amber-400 drop-shadow-[0_0_12px_rgba(251,191,36,0.3)] tracking-wider uppercase">${formattedPin}</span>
                </div>
              </div>
            </div>
            <div class="sm:text-right flex flex-col gap-1.5 items-start sm:items-end w-full sm:w-auto border-t border-slate-800/60 sm:border-0 pt-3 sm:pt-0">
              <span class="text-[11px] font-mono text-slate-400 font-bold tracking-tight bg-slate-950/60 px-2.5 py-1 rounded border border-slate-800">EXM-${examId}</span>
            </div>
          </div>
          
          <div class="bg-white border border-slate-200 rounded-xl p-4 sm:p-6 shadow-md w-full box-border overflow-hidden">
            <div class="solution-content w-full">${uniqueText}</div>
          </div>
        </div>
      `;
    }

    async function initializeExamRenderPipeline() {
      const urlParams = new URLSearchParams(window.location.search);
      const examId = urlParams.get('examId');
      const container = document.getElementById('print-container');

      if (!examId) {
        container.innerHTML = `<p class="text-red-400 text-center font-semibold py-10 bg-slate-900/50 border border-red-500/20 rounded-2xl mx-2">Error: Access validation context missing. Please re-enter PIN template.</p>`;
        return;
      }

      const localCachedData = getCachedExam(examId);
      if (localCachedData) {
        renderContentLayout(localCachedData.subject, examId, localCachedData.uniqueText, localCachedData.examPin);
        return;
      }

      try {
        const { data: exam, error: examErr } = await supabaseClient
          .from('exams')
          .select('id, subject, exam_pin, master_solution_template, master_solution')
          .eq('id', examId)
          .maybeSingle();

        if (examErr || !exam) {
          container.innerHTML = `<p class="text-red-400 text-center font-semibold py-10 bg-slate-900/50 border border-red-500/20 rounded-2xl mx-2">Database Error: Target examination sheet not resolved.</p>`;
          return;
        }

        const deviceId = getDeviceFingerprint();
        const baseBlueprint = exam.master_solution_template || exam.master_solution;
        let finalUniqueText = "";

        // Check verification forks: If a valid exam_pin exists on this row, it's premium master access
        if (exam.exam_pin) {
          finalUniqueText = baseBlueprint; 
        } else {
          // Anonymous Portal Route -> Check for pre-mutated variant or build a new one
          let { data: existingMutation } = await supabaseClient
            .from('mutated_solutions')
            .select('unique_solution_text')
            .eq('exam_id', exam.id)
            .eq('anonymous_device_tag', deviceId)
            .maybeSingle();

          if (existingMutation && existingMutation.unique_solution_text) {
            finalUniqueText = existingMutation.unique_solution_text;
          } else {
            finalUniqueText = compileVariantText(baseBlueprint, exam.subject, deviceId);

            await supabaseClient.from('mutated_solutions').upsert({
              exam_id: exam.id,
              anonymous_device_tag: deviceId,
              unique_solution_text: finalUniqueText
            }, { onConflict: 'anonymous_device_tag,exam_id' });
          }
        }

        setExamCache(examId, exam.subject, finalUniqueText, exam.exam_pin);
        renderContentLayout(exam.subject, examId, finalUniqueText, exam.exam_pin);

      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-center font-semibold py-4">Structural Generation Exception Detected.</p>`;
      }
    }

    function forceRefreshSolutions() {
      const urlParams = new URLSearchParams(window.location.search);
      const examId = urlParams.get('examId');
      const btn = document.getElementById('refresh-btn');
      
      if (examId) {
        localStorage.removeItem(`exam_cache_${examId}`);
      }
      
      if (btn) {
        btn.innerHTML = `<span>Refreshing...</span>`;
        btn.classList.add('opacity-70', 'animate-pulse');
      }
      
      setTimeout(() => { window.location.reload(); }, 200);
    }

    // High-Intelligence Subject-Aware Variation Engine
    function compileVariantText(template, subjectName, seed) {
      if (!template) return `<h3>System Error</h3><p>Missing content structure.</p>`;
      
      let subject = (subjectName || "").toLowerCase();
      let output = template;
      
      // Determine if text contains heavy mathematics/science notation contexts
      const isExactScience = subject.includes("math") || subject.includes("physic") || subject.includes("chemist") || subject.includes("further math");

      // SEED-BASED PSEUDO-RANDOM DETERMINISTIC BOOLEAN GENERATOR
      let seedCursor = 0;
      function getSeededDecision(mod) {
        let score = 0;
        for(let i=0; i<seed.length; i++) { score += seed.charCodeAt(i) + seedCursor; }
        seedCursor += 7;
        return (score % mod) === 0;
      }

      if (isExactScience) {
        // --- TYPE A: EXACT SCIENCE MUTATION MATRIX (Locks math parameters/formulas, shifts prose descriptors) ---
        
        // 1. Rotate standard scientific/mathematical connection phrases
        const proseMap = [
          { key: /Using the formula/gi, alt: ["Applying the equation", "From the standard expression", "Utilizing the relation"] },
          { key: /We can calculate/gi, alt: ["We obtain", "The evaluation yields", "It follows that"] },
          { key: /Substitute the given values/gi, alt: ["Placing the parameters into the expression", "Substituting the data constants", "Inputting the coordinates"] },
          { key: /Therefore, the final answer is/gi, alt: ["Hence, the computed value is", "Consequently, we arrive at", "Thus, the evaluation results in"] },
          { key: /Where acceleration due to gravity/gi, alt: ["Taking gravitational acceleration constant", "Where the gravitational factor", "Given gravity constant value"] }
        ];

        proseMap.forEach((phrase, idx) => {
          if (getSeededDecision(2 + (idx % 2))) {
            const chosenAlt = phrase.alt[Math.abs(seed.charCodeAt(idx % seed.length)) % phrase.alt.length];
            output = output.replace(phrase.key, chosenAlt);
          }
        });

        // 2. Rotate variable unit layouts smoothly without changing technical precision values
        if (getSeededDecision(2)) {
          output = output.replace(/m\/s\^2/g, "ms^{-2}").replace(/m\/s/g, "ms^{-1}").replace(/mol\/dm\^3/g, "mol&middot;dm^{-3}");
        } else if (getSeededDecision(3)) {
          output = output.replace(/m\/s\^2/g, "metres per second squared").replace(/m\/s/g, "metres per second");
        }

      } else {
        // --- TYPE B: GENERAL PROSE & ARTS PARAPHRASE MATRIX (Deep sentence variations) ---
        const structuralSynonyms = [
          { key: /\bcan be defined as\b/gi, alt: ["refers to", "is described as", "denotes"] },
          { key: /\bimportant factors\b/gi, alt: ["key elements", "vital characteristics", "critical attributes"] },
          { key: /\bthe main reason for\b/gi, alt: ["the primary cause of", "the fundamental basis behind", "the core driver for"] },
          { key: /\bconsequences of\b/gi, alt: ["effects resulting from", "aftermath of", "outcomes of"] },
          { key: /\blook at the following\b/gi, alt: ["consider the underlying", "observe the stated", "examine these highlighted"] },
          { key: /\bwith reference to\b/gi, alt: ["in relation to", "concerning", "based on"] }
        ];

        structuralSynonyms.forEach((syn, index) => {
          if (getSeededDecision(2)) {
            const wordSelection = syn.alt[Math.abs(seed.charCodeAt(index % seed.length)) % syn.alt.length];
            output = output.replace(syn.key, wordSelection);
          }
        });

        // 3. Structural Block Reordering (Swapping bullet lists safely if present)
        if (output.includes('<li>') && getSeededDecision(3)) {
          output = output.replace(/<ul>([\s\S]*?)<\/ul>/g, (listMatch, listInner) => {
            let items = listInner.split('<li>').filter(item => item.trim() !== "");
            if (items.length > 2) {
              // Rotate elements deterministically by pulling the last item to the front row
              let rotated = [items[items.length - 1], ...items.slice(0, items.length - 1)];
              return `<ul><li>` + rotated.join('<li>') + `</ul>`;
            }
            return listMatch;
          });
        }
      }

      return output;
    }

    initializeExamRenderPipeline();
  </script>
